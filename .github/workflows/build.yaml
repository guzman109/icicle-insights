
name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: write
  packages: write

jobs:
  docker:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ vars.GHCR_ACTOR }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/icicle-ai/insights:latest
            ghcr.io/icicle-ai/insights:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [docker]
    runs-on: ubuntu-24.04

    steps:
      - name: Extract binary from image
        run: |
          docker pull ghcr.io/icicle-ai/insights:${{ github.sha }}
          id=$(docker create ghcr.io/icicle-ai/insights:${{ github.sha }})
          docker cp $id:/app/icicle-insights ./icicle-insights
          docker rm $id

      - name: Create tarball
        run: tar -czf icicle-insights-linux-amd64.tar.gz icicle-insights

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: icicle-insights-linux-amd64.tar.gz
